- name: Ensure wheel group exists
  group:
    name: wheel
    state: present

- name: Create users
  user:
    name: "{{ item.name }}"
    groups: "{{ item.groups }}"
    append: yes
    shell: /bin/zsh
    state: present
  loop: "{{ users }}"

- name: Install authorized SSH keys
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
  loop: "{{ users | subelements('ssh_keys') }}"

- name: Install Tailscale via official script
  shell: |
    set -o pipefail
    curl -fsSL https://tailscale.com/install.sh | sh
  args:
    executable: /bin/bash
    creates: /usr/bin/tailscale

- name: Enable and start tailscaled
  systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Bring lab host onto Tailscale
  command:
    cmd: >-
      tailscale up
      --hostname={{ tailscale_hostname | default(inventory_hostname) }}
      {% if tailscale_ssh | default(true) %}--ssh{% endif %}
      --authkey={{ tailscale_authkey }}
  when:
    - tailscale_authkey is defined
    - tailscale_authkey | length > 0
